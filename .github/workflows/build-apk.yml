name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build APK with official Buildozer Docker image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}":/home/user/hostcwd \
            kivy/buildozer:latest android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
