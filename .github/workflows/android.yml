name: Build Android APK with Buildozer (Final Fix 2026)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt update
        sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev tk-dev libgdbm-compat-dev libltdl-dev
        pip install --user --upgrade pip setuptools virtualenv cython==3.0.10 buildozer

    - name: Build APK with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # 🌟 यहाँ हमने एन्वायरमेंट वेरिएबल सेट कर दिया है ताकि कंपाइलर केवल 3.11 ही उठाए
        export APP_ANDROID_ARCHS="arm64-v8a"
        
        # कंपाइल करने से पहले पुराने खराब टूल्स को डिलीट करना
        rm -rf .buildozer/
        
        # फाइनल वर्किंग बिल्ड कमांड
        buildozer -v android debug
